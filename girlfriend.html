<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Mood Recovery</title>

<style>

    border:none;
    padding:15px 25px;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#ff1744;
}
</style>

</head>

<body>

<p>❤️ Misses Her Boyfriend</p>

<button onclick="recover()">Start Treatment</button>

</div>

<script>

function recover(){

document.body.innerHTML=`

justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
background:#ffdde1;
text-align:center;">

<h1>🎉 Treatment Successful!</h1>

`;

</body>
</html>
