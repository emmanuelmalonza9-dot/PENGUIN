<!DOCTYPE html>
<html>
<head>
  <title>💔 No?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>💔 Are you sure?</h1>
  <p>Try pressing NO if you can catch it 😏</p>

  <img src="https://media.giphy.com/media/5GoVLqeAOo6PK/giphy.gif" class="img">

  <button class="no" id="noBtn">NO 💔</button>

  <br><br>
  <a href="index.html"><button class="yes">Go Back 🔙</button></a>
</div>

<script>
const btn = document.getElementById("noBtn");

btn.addEventListener("click", function () {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 100);

  btn.style.position = "absolute";
  btn.style.left = x + "px";
  btn.style.top = y + "px";
});
</script>

</body>
</html>
